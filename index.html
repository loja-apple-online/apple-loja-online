<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HL APPLE</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{background:#000;color:#fff;padding:20px;text-align:center;font-size:22px;font-weight:bold}

.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;padding:10px}

.card{background:#fff;border-radius:10px;padding:10px;text-align:center}
.card img{width:100%;border-radius:10px}

button{background:#000;color:#fff;border:none;padding:8px;width:100%;border-radius:6px;margin-top:5px}

.cart{
position:fixed;bottom:0;left:0;right:0;
background:#111;color:#fff;padding:12px;text-align:center
}
</style>
</head>

<body>

<header>🍎 HL APPLE</header>

<div class="container">

<div class="card">
<img src="https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-13-midnight-select-2021?wid=470&hei=556&fmt=png-alpha">
<h3>iPhone 13</h3>
<p>R$ 2.800</p>
<button onclick="add('iPhone 13',2800)">Adicionar</button>
</div>

<div class="card">
<img src="https://store.storeimages.cdn-apple.com/4668/as-images.apple.com/is/iphone-14-pro-deep-purple-select?wid=470&hei=556&fmt=png-alpha">
<h3>iPhone 14 Pro</h3>
<p>R$ 4.200</p>
<button onclick="add('iPhone 14 Pro',4200)">Adicionar</button>
</div>

</div>

<div class="cart">
🛒 Total: <span id="total">0</span> R$
<br>
<button onclick="irCheckout()">Ir para pagamento</button>
</div>

<script>

let total = 0;
let itens = [];

function add(nome, preco){
total += preco;
itens.push(nome);
document.getElementById("total").innerText = total;
localStorage.setItem("itens", JSON.stringify(itens));
localStorage.setItem("total", total);
}

function irCheckout(){
window.location.href = "checkout.html";
}

</script>

</body>
</html>
