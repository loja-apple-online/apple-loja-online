<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HL APPLE</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{background:#000;color:#fff;padding:20px;text-align:center;font-size:22px;font-weight:bold}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;padding:10px}

.card{background:#fff;border-radius:10px;padding:10px;text-align:center}
.card img{width:100%;border-radius:10px}

.price{color:green;font-weight:bold}

button{
background:#000;
color:#fff;
border:none;
padding:8px;
width:100%;
border-radius:6px;
margin-top:5px;
cursor:pointer;
}
</style>
</head>

<body>

<header>🍎 HL APPLE STORE</header>

<div class="grid">

<div class="card">
<img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-13-01.jpg">
<h3>iPhone 13</h3>
<p class="price">R$ 2.800</p>
<button onclick="ver('iphone13')">Ver detalhes / Comprar</button>
</div>

<div class="card">
<img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-14-1.jpg">
<h3>iPhone 14</h3>
<p class="price">R$ 3.200</p>
<button onclick="ver('iphone14')">Ver detalhes / Comprar</button>
</div>

<div class="card">
<img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-15-1.jpg">
<h3>iPhone 15</h3>
<p class="price">R$ 4.200</p>
<button onclick="ver('iphone15')">Ver detalhes / Comprar</button>
</div>

<div class="card">
<img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-16-pro-1.jpg">
<h3>iPhone 16 Pro</h3>
<p class="price">R$ 5.800</p>
<button onclick="ver('iphone16')">Ver detalhes / Comprar</button>
</div>

<div class="card">
<img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-17-pro-max-1.jpg">
<h3>iPhone 17 Pro Max</h3>
<p class="price">R$ 7.500</p>
<button onclick="ver('iphone17')">Ver detalhes / Comprar</button>
</div>

</div>

<script>
function ver(id){
localStorage.setItem("produto", id);
window.location.href="produto.html";
}
</script>

</body>
</html>
