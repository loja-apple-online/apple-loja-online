<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HL APPLE</title>
<script src="script.js" defer></script>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{background:#000;color:#fff;padding:20px;text-align:center;font-size:22px;font-weight:bold}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;padding:10px}

.card{background:#fff;border-radius:10px;padding:10px;text-align:center;cursor:pointer}
.card img{width:100%;border-radius:10px}

.price{color:green;font-weight:bold}

.cart{
position:fixed;bottom:0;left:0;right:0;
background:#111;color:#fff;padding:12px;text-align:center
}

button{
background:#000;color:#fff;border:none;padding:8px;width:100%;border-radius:6px
}
</style>
</head>

<body>

<header>🍎 HL APPLE STORE</header>

<div class="grid">

<div class="card" onclick="openProd('iphone13')">
<img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-13-01.jpg">
<h3>iPhone 13</h3>
<p class="price">R$ 2.800</p>
</div>

<div class="card" onclick="openProd('iphone14')">
<img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-14-1.jpg">
<h3>iPhone 14</h3>
<p class="price">R$ 3.200</p>
</div>

<div class="card" onclick="openProd('iphone15')">
<img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-15-1.jpg">
<h3>iPhone 15</h3>
<p class="price">R$ 4.200</p>
</div>

<div class="card" onclick="openProd('iphone16')">
<img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-16-pro-1.jpg">
<h3>iPhone 16 Pro</h3>
<p class="price">R$ 5.800</p>
</div>

<div class="card" onclick="openProd('iphone17')">
<img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-17-pro-max-1.jpg">
<h3>iPhone 17 Pro Max</h3>
<p class="price">R$ 7.500</p>
</div>

</div>

<div class="cart">
🛒 Total: <span id="total">0</span> R$
<br>
<button onclick="goCheckout()">Finalizar compra</button>
</div>

</body>
</html>
