<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Checkout</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="checkout">

<h2>Finalizar Compra</h2>

<h3 id="product"></h3>
<p id="price"></p>

<h3>Dados do cliente</h3>

<input id="name" placeholder="Nome completo">
<input id="cpf" placeholder="CPF">
<input id="phone" placeholder="Telefone">

<h3>Endereço</h3>

<input id="cep" placeholder="CEP" onblur="getCEP(this.value)">
<input id="street">
<input id="city">
<input id="state">
<input id="number">
<input id="extra">

<h3>PIX Copia e Cola</h3>

<textarea id="pix" readonly></textarea>

<button onclick="copyPIX()">📋 Copiar PIX</button>

<button class="green" onclick="finish()">
Confirmar pagamento
</button>

</div>

<script src="checkout.js"></script>

</body>
</html>
