<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Checkout HL APPLE</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
.box{background:#fff;margin:10px;padding:15px;border-radius:10px}

input{width:100%;padding:8px;margin-top:5px}
button{background:#000;color:#fff;border:none;padding:10px;width:100%;border-radius:6px}
</style>
</head>

<body>

<div class="box">
<h3>Resumo</h3>
<p id="resumo"></p>
<p>Total: R$ <span id="total"></span></p>
</div>

<div class="box">
<h3>📍 Endereço</h3>
<input id="cep" placeholder="CEP" onblur="buscarCEP()">
<p id="endereco"></p>

<input id="numero" placeholder="Número">
<input id="complemento" placeholder="Complemento">
</div>

<div class="box">
<button onclick="finalizar()">Finalizar compra</button>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = cart.reduce((s,i)=>s+i.price,0);

document.getElementById("resumo").innerText =
cart.map(i=>i.name).join(", ");

document.getElementById("total").innerText = total;

// CEP automático
function buscarCEP(){
let cep = document.getElementById("cep").value;

fetch(`https://viacep.com.br/ws/${cep}/json/`)
.then(r=>r.json())
.then(data=>{
document.getElementById("endereco").innerText =
data.logradouro + " - " + data.bairro + " - " + data.localidade;
});
}

function finalizar(){

let whatsapp = "5511960934864";
let pix = "11946796959";

// PEDIDO AUTOMÁTICO 334+
let pedido = localStorage.getItem("pedido") || 333;
pedido = parseInt(pedido) + 1;
localStorage.setItem("pedido", pedido);

let endereco = document.getElementById("endereco").innerText;
let numero = document.getElementById("numero").value;
let comp = document.getElementById("complemento").value;

let msg =
"🛒 HL APPLE PEDIDO #" + pedido +
"\n\nProdutos: " + cart.map(i=>i.name).join(", ") +
"\nTotal: R$ " + total +
"\nEndereço: " + endereco +
", Nº " + numero +
" - " + comp +
"\n\n💰 PIX: " + pix;

let url = "https://wa.me/" + whatsapp + "?text=" + encodeURIComponent(msg);

window.open(url);
}

</script>

</body>
</html>
