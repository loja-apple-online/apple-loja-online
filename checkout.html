<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout HL APPLE</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}

header{background:#000;color:#fff;padding:20px;text-align:center;font-size:20px;font-weight:bold}

.box{background:#fff;margin:10px;padding:15px;border-radius:10px}

.item{
border-bottom:1px solid #ddd;
padding:10px 0;
}

button{
background:#000;
color:#fff;
border:none;
padding:10px;
width:100%;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

input{
width:100%;
padding:8px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
}

.small{font-size:13px;color:#555}
.red{color:red;cursor:pointer}
</style>
</head>

<body>

<header>💳 Finalizar Compra HL APPLE</header>

<div class="box">
<h3>🛒 Seu Carrinho</h3>
<div id="cart"></div>
<p><b>Total:</b> R$ <span id="total">0</span></p>
</div>

<div class="box">
<h3>📍 Endereço</h3>

<input id="cep" placeholder="CEP" onblur="buscarCEP()">
<p id="endereco" class="small"></p>

<input id="numero" placeholder="Número da casa">
<input id="complemento" placeholder="Complemento (opcional)">

<p class="small">Frete automático será calculado</p>
</div>

<div class="box">
<h3>🚚 Frete</h3>
<p>R$ <span id="frete">0</span></p>
</div>

<div class="box">
<button onclick="finalizar()">Confirmar pedido</button>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;
let frete = 0;

// PEDIDO INICIAL 334+
let pedido = localStorage.getItem("pedidoHL") || 333;
pedido = parseInt(pedido) + 1;
localStorage.setItem("pedidoHL", pedido);

function renderCart(){

let html = "";

cart.forEach((item,index)=>{
html += `
<div class="item">
<b>${item.name}</b><br>
${item.storage || ""} ${item.color || ""}<br>
R$ ${item.price}<br>
<span class="red" onclick="removeItem(${index})">Remover</span>
</div>
`;
});

total = cart.reduce((s,i)=>s+i.price,0);

document.getElementById("cart").innerHTML = html;
document.getElementById("total").innerText = total;

}

function removeItem(i){
cart.splice(i,1);
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

function buscarCEP(){
let cep = document.getElementById("cep").value;

fetch(`https://viacep.com.br/ws/${cep}/json/`)
.then(r=>r.json())
.then(data=>{
document.getElementById("endereco").innerText =
data.logradouro + " - " + data.bairro + " - " + data.localidade;
calcFrete();
});
}

function calcFrete(){
frete = cart.length > 0 ? 25 : 0;
document.getElementById("frete").innerText = frete;
}

function finalizar(){

let whatsapp = "5511960934864";
let pix = "11946796959";

let endereco = document.getElementById("endereco").innerText;
let numero = document.getElementById("numero").value;
let comp = document.getElementById("complemento").value;

let msg =
"🛒 HL APPLE PEDIDO #" + pedido +
"\n\nProdutos:\n" +
cart.map(i=>"• "+i.name+" "+(i.storage||"")+" "+(i.color||"")).join("\n") +
"\n\nTotal: R$ " + total +
"\nFrete: R$ " + frete +
"\n\nEndereço: " + endereco +
", Nº " + numero +
" - " + comp +
"\n\n💰 PIX: " + pix +
"\n\n📦 Pedido em processamento.";

let url = "https://wa.me/" + whatsapp + "?text=" + encodeURIComponent(msg);

window.open(url);

// limpar carrinho após pedido
localStorage.removeItem("cart");

// página de confirmação
document.body.innerHTML = `
<div style="font-family:Arial;text-align:center;padding:50px">
<h1>🎉 Pedido Confirmado!</h1>
<p>Seu pedido #${pedido} foi enviado.</p>
<p>Você será atendido no WhatsApp.</p>
</div>
`;

}

renderCart();

</script>

</body>
</html>
