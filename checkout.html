<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checkout</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="checkout">

<h2>Finalizar Compra</h2>

<div id="resume"></div>

<h3>Cadastro</h3>

<input id="name" placeholder="Nome completo">
<input id="cpf" placeholder="CPF">
<input id="phone" placeholder="Telefone">

<h3>Endereço</h3>

<input id="cep" placeholder="CEP" onblur="cep(this.value)">
<input id="street" placeholder="Rua">
<input id="city" placeholder="Cidade">
<input id="state" placeholder="Estado">
<input id="number" placeholder="Número">
<input id="extra" placeholder="Complemento">

<h3>Pagamento PIX</h3>

<textarea id="pix"></textarea>

<button onclick="copy()">Copiar PIX</button>

<button class="green" onclick="finish()">
Confirmar pedido
</button>

</div>

<script src="products.js"></script>
<script src="checkout.js"></script>

</body>
</html>
