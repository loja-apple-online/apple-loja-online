<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produto HL APPLE</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}

.box{background:#fff;margin:10px;padding:15px;border-radius:10px}

img{width:100%;border-radius:10px}

.price{color:green;font-size:22px;font-weight:bold}

.desc{font-size:14px;color:#444;line-height:1.4}

select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

button{
background:#000;
color:#fff;
cursor:pointer;
font-size:15px;
}

.badge{
display:inline-block;
padding:5px 10px;
background:red;
color:#fff;
border-radius:5px;
font-size:12px;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="box" id="content"></div>

<script>

let data = {

iphone13:{
name:"iPhone 13",
price:2800,
badge:"🔥 Mais vendido",
imgs:[
"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-13-01.jpg",
"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-13-02.jpg"
],
desc:"Chip A15 Bionic, câmera dupla 12MP, vídeo 4K, ótimo desempenho."
},

iphone14:{
name:"iPhone 14",
price:3200,
badge:"⭐ Novo",
imgs:[
"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-14-1.jpg",
"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-14-2.jpg"
],
desc:"Detecção de acidentes, câmera melhorada e maior estabilidade."
},

iphone15:{
name:"iPhone 15",
price:4200,
badge:"🔥 Popular",
imgs:[
"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-15-1.jpg",
"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-15-2.jpg"
],
desc:"USB-C, câmera 48MP, Dynamic Island."
},

iphone16:{
name:"iPhone 16 Pro",
price:5800,
badge:"⭐ Pro",
imgs:[
"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-16-pro-1.jpg",
"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-16-pro-2.jpg"
],
desc:"Chip A18 Pro, câmera profissional e tela 120Hz."
},

iphone17:{
name:"iPhone 17 Pro Max",
price:7500,
badge:"🚀 Top de linha",
imgs:[
"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-17-pro-max-1.jpg",
"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-17-pro-max-2.jpg"
],
desc:"Máxima performance Apple, câmera IA avançada e bateria premium."
}

}

let p = localStorage.getItem("produto");
let item = data[p];

let currentImg = 0;

function render(){

document.getElementById("content").innerHTML = `

<span class="badge">${item.badge}</span>

<img src="${item.imgs[currentImg]}" onclick="nextImg()">

<h2>${item.name}</h2>

<p class="desc">${item.desc}</p>

<p class="price">R$ ${item.price}</p>

<label>Armazenamento:</label>
<select id="storage">
<option>128GB</option>
<option>256GB</option>
<option>512GB</option>
</select>

<label>Cor:</label>
<select id="color">
<option>Preto</option>
<option>Branco</option>
<option>Azul</option>
<option>Dourado</option>
</select>

<button onclick="add()">Adicionar ao carrinho</button>

`;

}

function nextImg(){
currentImg = (currentImg + 1) % item.imgs.length;
render();
}

function add(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({
name: item.name,
price: item.price,
storage: document.getElementById("storage").value,
color: document.getElementById("color").value
});

localStorage.setItem("cart", JSON.stringify(cart));

window.location.href = "checkout.html";
}

if(p) render();

</script>

</body>
</html>
