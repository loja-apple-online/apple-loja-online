<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produto HL APPLE</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}

.box{background:#fff;margin:10px;padding:15px;border-radius:10px}

img{width:100%;border-radius:10px}

h2{margin:10px 0}

.price{color:green;font-weight:bold;font-size:20px}

.desc{color:#444;font-size:14px;line-height:1.4}

button{
background:#000;
color:#fff;
border:none;
padding:12px;
width:100%;
border-radius:6px;
margin-top:10px;
cursor:pointer;
font-size:15px;
}
</style>
</head>

<body>

<div class="box" id="content"></div>

<script>

let data = {

iphone13:{
name:"iPhone 13",
price:2800,
img:"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-13-01.jpg",
desc:"📱 Chip A15 Bionic\n📸 Câmera dupla 12MP com modo noturno\n🎥 Gravação em 4K Dolby Vision\n🔋 Bateria de longa duração\n⚡ Desempenho rápido e estável"
},

iphone14:{
name:"iPhone 14",
price:3200,
img:"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-14-1.jpg",
desc:"📱 Chip A15 aprimorado\n📸 Câmera melhorada com Photonic Engine\n🚨 Detecção de acidentes\n🎥 Vídeos mais estáveis\n🔋 Bateria otimizada"
},

iphone15:{
name:"iPhone 15",
price:4200,
img:"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-15-1.jpg",
desc:"📱 Chip A16 Bionic\n⚡ USB-C (novo padrão)\n📸 Câmera 48MP\n🌈 Dynamic Island\n🔋 Mais eficiência energética"
},

iphone16:{
name:"iPhone 16 Pro",
price:5800,
img:"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-16-pro-1.jpg",
desc:"📱 Chip A18 Pro\n📸 Câmera profissional com zoom avançado\n🎥 Filmagem cinematográfica\n📺 Tela ProMotion 120Hz\n🔋 Alta performance"
},

iphone17:{
name:"iPhone 17 Pro Max",
price:7500,
img:"https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-17-pro-max-1.jpg",
desc:"🚀 Última geração Apple\n📱 Performance extrema\n📸 Câmera ultra avançada IA\n🎥 Qualidade profissional de cinema\n🔋 Melhor bateria da linha"
}

}

let p = localStorage.getItem("produto");

if(!p){
document.getElementById("content").innerHTML = "<h3>Produto não selecionado</h3>";
}else{

let item = data[p];

document.getElementById("content").innerHTML = `

<img src="${item.img}">
<h2>${item.name}</h2>

<p class="desc">${item.desc.replace(/\n/g,"<br>")}</p>

<p class="price">R$ ${item.price}</p>

<button onclick="add()">Adicionar ao carrinho</button>

`;
}

function add(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({
name: data[p].name,
price: data[p].price
});

localStorage.setItem("cart", JSON.stringify(cart));

window.location.href = "checkout.html";
}

</script>

</body>
</html>
